---
name: Bug Report
description: バグ報告をしたい
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どのような問題が発生しているか
      placeholder: 例) アップロード中に画面遷移するとアップロードが中断される
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 問題を再現するための手順を順番に
      placeholder: |
        1. ファイル一覧画面を開く
        2. 任意のファイルを選んでアップロードを開始する
        3. アップロード中に設定画面へ遷移する
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      placeholder: 例) 画面遷移後もアップロードが継続される
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      placeholder: 例) アップロードが中断され、ファイルが LocalOnly のままになる
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: アプリバージョン
      description: 設定画面などで確認できるバージョン
      placeholder: 例) 1.2.3
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: プラットフォーム
      options:
        - Android
        - iOS
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS バージョン
      placeholder: 例) Android 14 / iOS 17.4
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: 端末
      placeholder: 例) Pixel 8 / iPhone 15 Pro
    validations:
      required: false
  - type: textarea
    id: other
    attributes:
      label: その他
      description: スクリーンショット・ログなど補足情報
    validations:
      required: false
