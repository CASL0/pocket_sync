---
name: Feature Request
description: 機能追加・改善の提案
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: description
    attributes:
      label: 追加したいもの
      description: どのような機能・改善を追加したいか具体的に
      placeholder: 例) ファイル一覧でファイルサイズ順にソートできるようにしたい
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: なぜ必要か
      description: 解決したい課題や利用シーン
      placeholder: 例) 大容量ファイルを優先的に同期対象から外したいため
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案・回避策
      description: 既存機能や他のやり方で代替できないか検討した内容
    validations:
      required: false
